name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Smoke test
        run: npm run verify
